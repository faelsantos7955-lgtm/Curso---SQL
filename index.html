<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso de SQL — Aprenda do zero ao avançado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- CodeMirror 5 (syntax highlighting) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">SQL <span class="logo-accent">Curso</span></div>
    </div>
    <div class="topbar-center">
      <div class="progress-info">
        <span id="progress-text">0 / 0 aulas concluídas</span>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
    </div>
    <div class="topbar-right">
      <div id="streak-badge" class="streak-badge" hidden title="Dias consecutivos usando o curso">
        <span class="streak-icon">🔥</span><span id="streak-count">0</span>
      </div>
      <button id="btn-achievements" class="btn-secondary" title="Conquistas">
        <span style="margin-right:6px">🏆</span> <span id="ach-counter">0/0</span>
      </button>
      <button id="btn-encyclopedia" class="btn-secondary" title="Abrir Enciclopédia (Ctrl+K)">
        <span style="margin-right:6px">📖</span> Enciclopédia
      </button>
      <button id="btn-reset" class="btn-ghost" title="Resetar progresso">Resetar</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <section class="content" id="content">
      <div class="loading">Carregando...</div>
    </section>
  </main>

  <!-- Encyclopedia modal -->
  <div id="modal-encyclopedia" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h2 class="modal-title">📖 Enciclopédia SQL</h2>
        <button class="btn-ghost btn-sm" id="btn-close-modal">Fechar (Esc)</button>
      </div>
      <div class="modal-body">
        <aside class="enc-sidebar">
          <input type="text" id="enc-search" placeholder="Buscar termo..." autocomplete="off">
          <div class="enc-categories" id="enc-categories"></div>
          <div class="enc-list" id="enc-list"></div>
        </aside>
        <article class="enc-detail" id="enc-detail">
          <div class="empty-state">Selecione um termo na esquerda para ver a definição completa.</div>
        </article>
      </div>
    </div>
  </div>

  <!-- Achievements modal -->
  <div id="modal-achievements" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-panel modal-panel-narrow">
      <div class="modal-header">
        <h2 class="modal-title">🏆 Conquistas</h2>
        <button class="btn-ghost btn-sm" id="btn-close-ach">Fechar (Esc)</button>
      </div>
      <div class="modal-body" style="grid-template-columns:1fr">
        <div id="ach-grid" class="ach-grid"></div>
      </div>
    </div>
  </div>

  <!-- Hover tooltip for glossary terms -->
  <div id="term-tooltip" class="term-tooltip" hidden></div>

  <!-- CodeMirror JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>

  <!-- sql.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.min.js"></script>

  <script src="js/sqlEngine.js"></script>
  <script src="js/curriculum.js"></script>
  <script src="js/glossary.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
